<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('New Password')}"></head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <nav th:replace="~{fragments :: navbar}"></nav>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="glass animate-slide-up" style="width: 100%; max-width: 440px; padding: 3rem; border-radius: 28px; box-shadow: var(--shadow-xl);">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem;" class="text-gradient">New Password</h2>
                <p style="color: var(--text-muted);">Secure your account with a new password.</p>
            </div>

            <div id="error-msg" class="glass" style="display: none; padding: 1rem; border-radius: 12px; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: var(--danger); margin-bottom: 1.5rem; font-size: 0.875rem; text-align: center;"></div>
            <div id="success-msg" class="glass" style="display: none; padding: 1rem; border-radius: 12px; background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); color: var(--success); margin-bottom: 1.5rem; font-size: 0.875rem; text-align: center;"></div>

            <form id="resetForm">
                <input type="hidden" id="token" th:value="${token}" />
                <div class="input-group">
                    <label class="input-label" for="password">New Password</label>
                    <input class="auth-input" type="password" id="password" name="password" placeholder="••••••••" required />
                </div>
                <div class="input-group" style="margin-bottom: 2rem;">
                    <label class="input-label" for="confirmPassword">Confirm Password</label>
                    <input class="auth-input" type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required />
                </div>

                <button class="btn btn-primary" type="submit" style="width: 100%; padding: 1rem;">Update Password</button>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>

    <script>
        document.getElementById("resetForm").addEventListener("submit", async function (event) {
            event.preventDefault();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const token = document.getElementById("token").value;
            const errorMsg = document.getElementById("error-msg");
            const successMsg = document.getElementById("success-msg");
            const submitBtn = event.target.querySelector('button[type="submit"]');

            if (password !== confirmPassword) {
                errorMsg.innerText = "Passwords do not match.";
                errorMsg.style.display = "block";
                return;
            }

            errorMsg.style.display = "none";
            successMsg.style.display = "none";
            submitBtn.disabled = true;
            submitBtn.innerText = "Updating...";

            try {
                const payload = { token, newPassword: password };
                const response = await fetch("/api/v1/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    successMsg.innerText = "Password updated! Redirecting to login...";
                    successMsg.style.display = "block";
                    event.target.style.display = "none";
                    setTimeout(() => window.location.href = "/login", 2000);
                } else {
                    const data = await response.json();
                    errorMsg.innerText = data.message || "Failed to reset password.";
                    errorMsg.style.display = "block";
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Update Password";
                }
            } catch (error) {
                errorMsg.innerText = "Network error.";
                errorMsg.style.display = "block";
                submitBtn.disabled = false;
                submitBtn.innerText = "Update Password";
            }
        });
    </script>
</body>
</html>

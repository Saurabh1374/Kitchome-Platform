<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/auth.css}" />
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h2>New Password</h2>
            <p style="font-size: 0.9rem; color: #666;">Enter your new password below</p>
        </div>

        <div id="message" class="error-message"></div>

        <form id="resetForm" class="auth-form">
            <input type="hidden" id="token" />
            <div class="form-group">
                <input class="auth-input" type="password" id="password" placeholder="New Password" required />
            </div>
            <div class="form-group">
                <input class="auth-input" type="password" id="confirmPassword" placeholder="Confirm New Password"
                    required />
            </div>
            <button class="auth-btn" type="submit">Reset Password</button>
        </form>

        <div class="auth-links">
            <a href="/login" class="auth-link">Back to Login</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Extract token from URL query params
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                const msg = document.getElementById("message");
                msg.innerText = "Invalid or missing reset token.";
                msg.classList.add("error-message");
                msg.style.display = "block";
                document.getElementById("resetForm").style.display = "none";
            } else {
                document.getElementById("token").value = token;
            }
        });

        document.getElementById('resetForm').addEventListener('submit', async function (event) {
            event.preventDefault();
            const messageDiv = document.getElementById("message");
            messageDiv.style.display = "none";
            messageDiv.classList.remove("success-message", "error-message");

            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const token = document.getElementById("token").value;

            if (password !== confirmPassword) {
                messageDiv.innerText = "Passwords do not match!";
                messageDiv.classList.add("error-message");
                messageDiv.style.display = "block";
                return;
            }

            try {
                // Assuming POST body contains token and new password 
                const response = await fetch('/api/v1/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token: token, newPassword: password })
                });

                if (response.ok) {
                    messageDiv.innerText = "Password reset successful! Redirecting to login...";
                    messageDiv.classList.add("success-message");
                    messageDiv.style.display = "block";
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    const data = await response.json();
                    let msg = "Error resetting password.";
                    if (data.message) msg = data.message;

                    messageDiv.innerText = msg;
                    messageDiv.classList.add("error-message");
                    messageDiv.style.display = "block";
                }
            } catch (error) {
                console.error("Error:", error);
                messageDiv.innerText = "Network error.";
                messageDiv.classList.add("error-message");
                messageDiv.style.display = "block";
            }
        });
    </script>
</body>

</html>

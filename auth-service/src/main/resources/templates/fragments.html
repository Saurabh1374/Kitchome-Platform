<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | KitChome'">KitChome</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <!-- Navbar Fragment -->
    <nav th:fragment="navbar" class="glass"
        style="position: sticky; top: 0; z-index: 100; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
        <a href="/" style="text-decoration: none; display: flex; align-items: center; gap: 0.75rem;">
            <div
                style="width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>
        <div id="nav-actions" style="display: flex; gap: 1rem; align-items: center;">
            <th:block th:if="${!isAuthenticated}">
                <a href="/login" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Login</a>
                <a href="/register" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Get Started</a>
            </th:block>
            <th:block th:if="${isAuthenticated}">
                <a href="/dashboard" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Dashboard</a>
                <form th:action="@{/api/v1/auth/logout}" method="post" style="margin: 0;" id="logoutForm">
                    <button type="submit" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.875rem; border-color: var(--danger); color: var(--danger);">Logout</button>
                </form>
            </th:block>
        </div>
    </nav>
    <!-- Sidebar Fragment (for Dashboard) -->
    <aside th:fragment="sidebar" class="glass"
        style="width: 260px; height: calc(100vh - 4rem); position: sticky; top: 5rem; border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem;">
        <a th:href="@{/dashboard}" class="btn btn-outline sidebar-link"
            style="justify-content: flex-start; border: none; width: 100%;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            Dashboard
        </a>
        <a th:href="@{/integrations}" class="btn btn-outline sidebar-link"
            style="justify-content: flex-start; border: none; width: 100%;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            Integrations
        </a>
        <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
            <p style="font-size: 0.75rem; color: var(--text-dim); text-align: center;">v1.0.4-stable</p>
        </div>
    </aside>

    <!-- Footer Fragment -->
    <footer th:fragment="footer"
        style="margin-top: 4rem; padding: 2rem; text-align: center; color: var(--text-dim); font-size: 0.875rem;">
        &copy; 2026 KitChome Platform. Built for Security & Scalability.
    </footer>
</body>

</html>

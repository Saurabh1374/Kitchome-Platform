<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/auth.css}" />
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h2>Reset Password</h2>
            <p style="font-size: 0.9rem; color: #666;">Enter your email to receive a reset link</p>
        </div>

        <div id="message" class="error-message"></div>

        <form id="forgotForm" class="auth-form">
            <div class="form-group">
                <input class="auth-input" type="email" id="email" placeholder="Email Address" required />
            </div>
            <button class="auth-btn" type="submit">Send Reset Link</button>
        </form>

        <div class="auth-links">
            <a href="/login" class="auth-link">Back to Login</a>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function (event) {
            event.preventDefault();
            const messageDiv = document.getElementById("message");
            messageDiv.style.display = "none";
            messageDiv.classList.remove("success-message", "error-message");

            const email = document.getElementById("email").value;

            try {
                // Assuming URL based on standard rest practices, need to verify controller if exists
                // The prompt mentioned ForgotPasswordService, so likely there is a controller
                const response = await fetch('/api/v1/auth/forgot-password?email=' + encodeURIComponent(email), {
                    method: 'POST'
                });

                if (response.ok) {
                    messageDiv.innerText = "If an account exists, a reset link has been sent.";
                    messageDiv.classList.add("success-message");
                    messageDiv.style.display = "block";
                } else {
                    messageDiv.innerText = "Error processing request.";
                    messageDiv.classList.add("error-message");
                    messageDiv.style.display = "block";
                }
            } catch (error) {
                console.error("Error:", error);
                messageDiv.innerText = "Network error.";
                messageDiv.classList.add("error-message");
                messageDiv.style.display = "block";
            }
        });
    </script>
</body>

</html>

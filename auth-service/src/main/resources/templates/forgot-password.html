<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Forgot Password')}"></head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <nav th:replace="~{fragments :: navbar}"></nav>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="glass animate-slide-up" style="width: 100%; max-width: 440px; padding: 3rem; border-radius: 28px; box-shadow: var(--shadow-xl);">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem;" class="text-gradient">Reset Password</h2>
                <p style="color: var(--text-muted);">Enter your email to receive a reset link.</p>
            </div>

            <div id="error-msg" class="glass" style="display: none; padding: 1rem; border-radius: 12px; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: var(--danger); margin-bottom: 1.5rem; font-size: 0.875rem; text-align: center;"></div>
            <div id="success-msg" class="glass" style="display: none; padding: 1rem; border-radius: 12px; background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); color: var(--success); margin-bottom: 1.5rem; font-size: 0.875rem; text-align: center;"></div>

            <form id="forgotForm">
                <div class="input-group" style="margin-bottom: 2rem;">
                    <label class="input-label" for="email">Email Address</label>
                    <input class="auth-input" type="email" id="email" name="email" placeholder="john@example.com" required />
                </div>

                <button class="btn btn-primary" type="submit" style="width: 100%; padding: 1rem;">Send Reset Link</button>
            </form>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="/login" style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem;">
                    Back to <span style="color: var(--primary-light); font-weight: 600;">Sign in</span>
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>

    <script>
        document.getElementById("forgotForm").addEventListener("submit", async function (event) {
            event.preventDefault();
            const email = document.getElementById("email").value;
            const errorMsg = document.getElementById("error-msg");
            const successMsg = document.getElementById("success-msg");
            const submitBtn = event.target.querySelector('button[type="submit"]');

            errorMsg.style.display = "none";
            successMsg.style.display = "none";
            submitBtn.disabled = true;
            submitBtn.innerText = "Sending...";

            try {
                const response = await fetch("/api/v1/auth/forgot-password?email=" + encodeURIComponent(email), {
                    method: "POST"
                });

                if (response.ok) {
                    successMsg.innerText = "If an account exists, a reset link has been sent.";
                    successMsg.style.display = "block";
                    event.target.style.display = "none";
                } else {
                    errorMsg.innerText = "Request failed. Please try again.";
                    errorMsg.style.display = "block";
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Send Reset Link";
                }
            } catch (error) {
                errorMsg.innerText = "Network error.";
                errorMsg.style.display = "block";
                submitBtn.disabled = false;
                submitBtn.innerText = "Send Reset Link";
            }
        });
    </script>
</body>
</html>

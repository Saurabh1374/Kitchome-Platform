<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Integrations')}"></head>
<body style="background-color: var(--bg-darker);">
    <nav th:replace="~{fragments :: navbar}"></nav>

    <div style="max-width: 1400px; margin: 0 auto; display: flex; gap: 2rem; padding: 0 2rem 4rem;">
        <!-- Sidebar -->
        <aside th:replace="~{fragments :: sidebar}"></aside>

        <!-- Main Content -->
        <main style="flex: 1; display: flex; flex-direction: column; gap: 2rem;">
            <header class="animate-slide-up">
                <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem;" class="text-gradient">App Integrations</h1>
                <p style="color: var(--text-muted); font-size: 1.1rem;">Connect your favorite tools to automate your workflow.</p>
            </header>

            <!-- Loading Spinner -->
            <div id="loading" style="display: flex; justify-content: center; padding: 4rem;">
                <div style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animate: spin 1s linear infinite;"></div>
            </div>

            <!-- Integrations Grid -->
            <div id="integrations-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem;" class="animate-slide-up">
                <!-- Cards will be injected here -->
            </div>
            
            <!-- Empty State (Hidden) -->
            <div id="empty-state" class="glass" style="display: none; padding: 4rem; text-align: center; border-radius: 24px;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="1.5" style="margin-bottom: 1.5rem;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                <h3 style="font-size: 1.5rem; color: var(--text-main); margin-bottom: 0.5rem;">No integrations found</h3>
                <p style="color: var(--text-muted);">We're working on adding more providers soon.</p>
            </div>
        </main>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .integration-card {
            padding: 2rem;
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        
        .integration-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-light);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            text-transform: uppercase;
        }

        .status-connected {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .status-disconnected {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
        }
    </style>

    <script>
        $(document).ready(function() {
            fetchIntegrations();
        });

        function fetchIntegrations() {
            $.ajax({
                url: "/api/v1/auth/integrations",
                method: "GET",
                success: function(response) {
                    $('#loading').hide();
                    const integrations = response.data;
                    
                    if (integrations.length === 0) {
                        $('#empty-state').show();
                        return;
                    }

                    renderIntegrations(integrations);
                },
                error: function(xhr) {
                    $('#loading').hide();
                    alert("Failed to load integrations.");
                }
            });
        }

        function renderIntegrations(integrations) {
            const grid = $('#integrations-grid');
            grid.empty();

            integrations.forEach(integration => {
                const card = $(`
                    <div class="glass integration-card">
                        <div style="display: flex; align-items: flex-start; justify-content: space-between;">
                            <div style="width: 56px; height: 56px; border-radius: 16px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; padding: 10px;">
                                <img src="${integration.iconUrl}" alt="${integration.displayName}" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                            </div>
                            <span class="status-badge ${integration.connected ? 'status-connected' : 'status-disconnected'}">
                                ${integration.connected ? 'Connected' : 'Disconnected'}
                            </span>
                        </div>
                        
                        <div>
                            <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem;">${integration.displayName}</h3>
                            <p style="color: var(--text-muted); font-size: 0.875rem; line-height: 1.5; height: 3rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
                                ${integration.description}
                            </p>
                        </div>
                        
                        <div style="margin-top: auto;">
                            ${integration.connected ? 
                                `<button class="btn btn-outline" style="width: 100%; border-color: rgba(16, 185, 129, 0.2); color: var(--success); cursor: default;">Active Connection</button>` : 
                                `<button onclick="initiateAuth('${integration.name}')" class="btn btn-primary" style="width: 100%;">Connect Platform</button>`
                            }
                        </div>
                    </div>
                `);
                grid.append(card);
            });
        }

        function initiateAuth(providerName) {
            $.ajax({
                url: `/api/v1/auth/integrations/${providerName}/authorize`,
                method: "GET",
                success: function(response) {
                    if (response.data && response.data.authorizationUrl) {
                        window.location.href = response.data.authorizationUrl;
                    } else {
                        alert("Could not initiate authorization.");
                    }
                },
                error: function() {
                    alert("Error initiating integration.");
                }
            });
        }
    </script>
</body>
</html>

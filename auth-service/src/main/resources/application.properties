spring.application.name=authentication


spring.profiles.active=local

# Use this pattern to display the log in a readable format
logging.pattern.console= ${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n}


# 15 minutes
jwt.expiration-ms=900000
# 14 days
jwt.refresh-expiration-ms=1209600000



# Tracing Configuration
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.tracing.propagation.type=w3c

# Logging Persistence (Logback)
logging.file.name=logs/auth-service.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.total-size-cap=1GB
logging.logback.rollingpolicy.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%t] %c{1} [%X{traceId}, %X{spanId}] - %m%n


